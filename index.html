
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atardecer Nevado con Mensaje</title>


<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }


    body {
        overflow: hidden;
    }


    .escena {
        width: 100%;
        height: 100vh;
        position: relative;
        background: linear-gradient(to bottom, #2b1055, #7597de, #ff7b54, #ffd56f);
        display: flex;
        justify-content: center;
        align-items: center;
    }


   
    .suelo {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 20vh;
        background: #ffffff;
        border-top-left-radius: 50% 30px;
        border-top-right-radius: 50% 30px;
        z-index: 10;
        box-shadow: 0 -10px 50px rgba(255, 255, 255, 0.4);
    }


   
    .muneco {
        position: absolute;
        bottom: 12vh;
        left: 20%;
        z-index: 11;
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        gap: 0px;
    }


    .bola {
        background: #fdfdfd;
        border-radius: 50%;
        box-shadow: inset -8px -8px 15px rgba(0,0,0,0.1);
        flex-shrink: 0;
    }


    .bola.grande { width: 100px; height: 95px; }
    .bola.mediana { width: 75px; height: 70px; }
    .bola.pequena { width: 55px; height: 50px; position: relative; }


    .ojo { width: 6px; height: 6px; background: #333; border-radius: 50%; position: absolute; top: 18px; }
    .ojo.izq { left: 18px; }
    .ojo.der { right: 18px; }
   
    .nariz {
        width: 0; height: 0;
        border-left: 12px solid #ff6600;
        border-top: 4px solid transparent;
        border-bottom: 4px solid transparent;
        position: absolute; top: 25px; left: 25px;
    }
     .muneco2{
        position: absolute;
        bottom: 12vh;
        left: 80%;
        top: 50%;
        z-index: 11;
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        gap: 0px;
    }


    .bola2{
        background: #fdfdfd;
        border-radius: 50%;
        box-shadow: inset -8px -8px 15px rgba(0,0,0,0.1);
        flex-shrink: 0;
    }


    .bola.grande2{ width: 100px; height: 100px; }
    .bola.mediana2{ width: 75px; height: 70px; }
    .bola.pequena2{ width: 55px; height: 50px; position: relative; }


    .ojo2{ width: 6px; height: 6px; background: #333; border-radius: 50%; position: absolute; top: 18px; }
    .ojo.izq2{ left: 18px; }
    .ojo.der2 { right: 18px; }
   
    .nariz2 {
        width: 0; height: 0;
        border-left: 12px solid #ff6600;
        border-top: 4px solid transparent;
        border-bottom: 4px solid transparent;
        position: absolute; top: 25px; left: 25px;
    }



   
    .sol-container {
        position: relative;
        width: 150px;
        height: 150px;
        margin-top: 300px;
        display: flex;
        justify-content: center;
    }


    .sol {
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #fff6a9, #ff9900);
        border-radius: 50%;
        position: absolute;
        z-index: 2;
        box-shadow: 0 0 60px orange;
    }


    p {
        position: absolute;
        top: -180px;
        width: 600px; 
        text-align: center;
        color: white;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 1.4rem; /* Letra más grandecita */
        font-weight: 600;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        z-index: 15;
        line-height: 1.3;
    }


    .rayo {
        width: 6px;
        height: 60px;
        background: linear-gradient(to top, #ffcc00, transparent);
        position: absolute;
        left: 50%;
        bottom: 110%;
        transform-origin: center 155px;
        transform: translateX(-50%) rotate(var(--angulo));
        border-radius: 10px;
        animation: brilloRayo 2s ease-in-out infinite alternate;
    }
    .star1{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 10%;
        left: 10%;
    }
    .star2{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 37%;
        left: 23%;

    }
    .star3{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 20%;
        left: 45%;

    }
    .star4{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 25%;
        left: 70%;

    }
    .star5{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 15%;
        left: 90%;

    }
    .star6{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 40%;
        left: 8%;

    }
    .star7{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 40%;
        left: 87%;

    }
    .star8{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 10%;
        left: 60%;

    }
    .star9{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 19%;
        left: 28%;

    }
    .star10{
        position:absolute;
        background:#fdfdfd;
        animation: brillostar 2s ease-in-out infinite alternate;
        width: 6px;
        height: 6px;
        border-radius: 50px;
        top: 25%;
        left: 70%;

    }
    
     @keyframes brillostar{
        from { opacity: 0.2; transform: translateX(-50%) rotate(var(--angulo)) scaleY(0); }
        to { opacity: 5; transform: translateX(-50%) rotate(var(--angulo)) scaleY(3.0); }
    }

    


    @keyframes brilloRayo {
        from { opacity: 0.3; transform: translateX(-50%) rotate(var(--angulo)) scaleY(0.8); }
        to { opacity: 1; transform: translateX(-50%) rotate(var(--angulo)) scaleY(1.2); }
    }

   
.estrella-fugaz-aislada {
  position: fixed; 
  top: 5%;       
  right: -150px;   
  width: 120px;    
  height: 2px;     
  background: linear-gradient(-45deg, #ffffff, rgba(255, 255, 255, 0));
  filter: drop-shadow(0 0 8px #ffffff) drop-shadow(0 0 18px #ffffff);
  border-radius: 50%;
  z-index: 9999;  
  pointer-events: none; 
  animation: trayectoriaAislada 4s linear infinite;
}


.estrella-fugaz-aislada::before {
  content: '';
  position: absolute;
  top: -2.7px;
  left: 0;
  transform: translateY(50%);
  width: 5px;
  height: 5px;
  background-color: #ffffff;
  border-radius: 50%;
  box-shadow: 0 0 15px 5px #ffffff;
}


@keyframes trayectoriaAislada {0% {
    transform: translateX(0) translateY(0) rotate(-15deg);
    opacity: 0;
  }
  5% {
    opacity: 1; 
  }
  70% {
    opacity: 1;
  }
  100% {
    
    transform: translateX(-115vw) translateY(75vh) rotate(-15deg);
    opacity: 0; 
}}
  


    .nube{
        width: 200px;
        height: 60px;
        background: rgba(255, 255, 255, 0.774);
        border-radius: 50px;
        position: absolute;
        animation: mover linear infinite;
        z-index: 3;
    }


    .nube::before, .nube::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.774);
        border-radius: 50%;
    }


    .nube::before { width: 70px; height: 70px; top: -30px; left: 30px; }
    .nube::after { width: 90px; height: 90px; top: -40px; right: 20px; }


    .n1 { top: 15%; left: -250px; animation-duration: 16s; }
    .n2 { top: 30%; left: -300px; animation-duration: 20s; }
    .n3 { top: 45%; left: -200px; animation-duration: 14s; }


    @keyframes mover {
        from { transform: translateX(-10vw); }
        to { transform: translateX(110vw); }
    }

    @media (max-width: 400px) {

        .escena {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        p{ 
            width: 100vw;
            unicode-bidi: isolate;
        }
        
    }
</style>
</head>
<body>


<div class="escena">
    <div class="nube n1"></div>
    <div class="nube n2"></div>
    <div class="nube n3"></div>


    <div class="sol-container">
        <div class="sol"></div>
        <div class="rayo" style="--angulo: 0deg"></div>
        <div class="rayo" style="--angulo: 30deg"></div>
        <div class="rayo" style="--angulo: 60deg"></div>
        <div class="rayo" style="--angulo: 90deg"></div>
        <div class="rayo" style="--angulo: 120deg"></div>
        <div class="rayo" style="--angulo: 150deg"></div>
        <div class="rayo" style="--angulo: 180deg"></div>
        <div class="rayo" style="--angulo: 210deg"></div>
        <div class="rayo" style="--angulo: 240deg"></div>
        <div class="rayo" style="--angulo: 270deg"></div>
        <div class="rayo" style="--angulo: 300deg"></div>
        <div class="rayo" style="--angulo: 330deg"></div>
       
        <p>"La injusticia en cualquier parte es una amenaza a la justicia en todas partes"
            -Martin Luther King.</p>
    </div>


    <div class="muneco">
        <div class="bola grande"></div>
        <div class="bola mediana"></div>
        <div class="bola pequena">
            <div class="ojo izq"></div>
            <div class="ojo der"></div>
            <div class="nariz"></div>
        </div>
    </div>
    <div class="muneco2">
        <div class="bola grande2"></div>
        <div class="bola mediana2"></div>
        <div class="bola pequena2">
            <div class="ojo izq2"></div>
            <div class="ojo der2"></div>
            <div class="nariz2"></div>
        </div>
    </div>
    <div class="stars">
         <div class="star1"></div>
         <div class="star2"></div>
         <div class="star3"></div>
         <div class="star4"></div>
         <div class="star5"></div>
         <div class="star6"></div>
         <div class="star7"></div>
         <div class="star8"></div>
         <div class="star9"></div>
         <div class="star10"></div>
    </div>
    <div class="estrella-fugaz-aislada"></div>


    <div class="suelo"></div>
</div>


</body>
</html>
